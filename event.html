<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChemConnect | Events</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>
<nav class="navbar">
  <div class="container nav-container">
    <div class="logo"><i class="fas fa-flask"></i> ChemConnect</div>
    <div class="menu-icon" id="menuToggle"><i class="fas fa-bars"></i></div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="events.html" class="active">Events</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="faculty.html">Faculty</a></li>
      <li><a href="index.html#join" class="btn-outline">Join Club</a></li>
    </ul>
  </div>
</nav>

<section style="padding: 5rem 0;">
  <div class="container">
    <h2 class="section-title">All Events</h2>
    <p class="section-sub">Check out our full calendar and join the excitement</p>
    <div class="grid" id="allEventsGrid"></div>
  </div>
</section>

<!-- Modal (same as index) -->
<div id="eventModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <h3 id="modalTitle">Event Title</h3>
    <div class="event-detail">
      <p><strong><i class="far fa-calendar-alt"></i> Date:</strong> <span id="modalDate"></span></p>
      <p><strong><i class="fas fa-map-marker-alt"></i> Location:</strong> <span id="modalLocation"></span></p>
      <p><strong>Description:</strong> <span id="modalDescription"></span></p>
    </div>
    <form id="registrationForm">
      <input type="hidden" id="modalEventId">
      <input type="text" id="regName" placeholder="Your Name" required>
      <input type="email" id="regEmail" placeholder="Your Email" required>
      <button type="submit">Register for this event</button>
    </form>
  </div>
</div>

<footer>
  <div class="container">
    <div class="social-links"><a href="#"><i class="fab fa-instagram"></i></a><a href="#"><i class="fab fa-twitter"></i></a><a href="#"><i class="fab fa-linkedin-in"></i></a><a href="#"><i class="fab fa-github"></i></a></div>
    <p>© 2025 ChemConnect — College Chemistry Club | Curiosity fuels discovery</p>
  </div>
</footer>

<script src="js/main.js"></script>
<script>
  const allEvents = [
    { id:1, title:"🧪 Glow-in-the-dark Chem Lab", date:"April 12, 2025 · 4:00 PM", location:"Science Hall 204", description:"Synthesis of luminescent compounds — create your own glowing solution. All safety gear provided." },
    { id:2, title:"🔬 Green Chemistry in Pharma", date:"April 25, 2025 · 6:30 PM", location:"Auditorium 101 & Virtual", description:"Dr. Elena Vasquez (Pfizer) shares sustainable practices. Q&A + networking." },
    { id:3, title:"⚗️ Mole Day BBQ + Demo Show", date:"May 3, 2025 · 12:00 PM", location:"Central Quad", description:"Celebrate 6.02x10²³ with liquid nitrogen ice cream, elephant toothpaste, and food!" },
    { id:4, title:"🧬 Spectroscopy Workshop", date:"May 15, 2025 · 3:00 PM", location:"Chem Lab 3", description:"Hands-on introduction to UV-Vis and IR spectroscopy. Limited spots." }
  ];
  const grid = document.getElementById('allEventsGrid');
  allEvents.forEach(ev => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.cursor = 'pointer';
    card.innerHTML = `
      <div class="event-date"><i class="far fa-calendar-alt"></i> ${ev.date}</div>
      <h3>${ev.title}</h3>
      <p>${ev.description.substring(0, 80)}...</p>
      <span style="color:#1f6e6b;">📍 ${ev.location}</span>
    `;
    card.addEventListener('click', () => openEventModal(ev));
    grid.appendChild(card);
  });
</script>
</body>
</html>
